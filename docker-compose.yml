services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "54320:5432"
    environment:
      POSTGRES_DB: dao_test
      POSTGRES_USER: dao
      POSTGRES_PASSWORD: dao
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U dao -d dao_test
      interval: 1s
      timeout: 3s
      retries: 15
